version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/**"
    schedule:
      interval: "daily"
    groups:
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directories:
      - "/"
    schedule:
      interval: "daily"
    groups:
      go-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directories:
      - "/**"
    schedule:
      interval: "daily"
    groups:
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"